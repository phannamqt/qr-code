name: CI/CD Docker to Server

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  IMAGE_NAME: phannamit/qr-code

jobs:
  # 1️⃣ Build & push image lên Docker Hub
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          no-cache: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # 2️⃣ Deploy lên server
  deploy-server:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "/opt/qr-code"

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export PATH=$PATH:/usr/local/bin:/usr/bin

            cd /opt/qr-code

            # --- 1. Upsert từng biến vào .env ---
            touch .env
            upsert_env() {
              local key=$1 val=$2
              if grep -q "^${key}=" .env; then
                sed -i "s|^${key}=.*|${key}=${val}|" .env
              else
                echo "${key}=${val}" >> .env
              fi
            }

            upsert_env NODE_ENV        production
            upsert_env APP_PORT        3000
            upsert_env DB_HOST         "${{ secrets.DB_HOST }}"
            upsert_env DB_PORT         "${{ secrets.DB_PORT }}"
            upsert_env DB_USERNAME     "${{ secrets.DB_USERNAME }}"
            upsert_env DB_PASSWORD     "${{ secrets.DB_PASSWORD }}"
            upsert_env DB_NAME         "${{ secrets.DB_NAME }}"
            upsert_env UPLOAD_DIR      /app/uploads

            # --- 2. Pull image mới nhất ---
            echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
            docker pull ${{ env.IMAGE_NAME }}:latest

            # --- 3. Restart container ---
            docker compose -f docker-compose.yml up -d --force-recreate app

            # --- 4. Dọn rác image cũ ---
            docker image prune -f
